name: Docker CI

on:
  push:
    branches: [main]

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t ai-travel-backend .

      - name: Build frontend image
        run: docker build -t ai-travel-frontend ./client
